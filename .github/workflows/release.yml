name: Release

permissions:
  contents: read
  id-token: write

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            rust_target: aarch64-apple-darwin
            binary_name: agent-ads
            dist_name: agent-ads-darwin-arm64
            needs_cross_gcc: "false"
            linker: ""
          - os: macos-latest
            rust_target: x86_64-apple-darwin
            binary_name: agent-ads
            dist_name: agent-ads-darwin-x64
            needs_cross_gcc: "false"
            linker: ""
          - os: ubuntu-latest
            rust_target: aarch64-unknown-linux-gnu
            binary_name: agent-ads
            dist_name: agent-ads-linux-arm64-gnu
            needs_cross_gcc: "true"
            linker: aarch64-linux-gnu-gcc
          - os: ubuntu-latest
            rust_target: x86_64-unknown-linux-gnu
            binary_name: agent-ads
            dist_name: agent-ads-linux-x64-gnu
            needs_cross_gcc: "false"
            linker: ""
          - os: windows-latest
            rust_target: x86_64-pc-windows-msvc
            binary_name: agent-ads.exe
            dist_name: agent-ads-win32-x64-msvc.exe
            needs_cross_gcc: "false"
            linker: ""
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust_target }}
      - uses: Swatinem/rust-cache@v2
      - name: Install Linux cross compiler
        if: matrix.needs_cross_gcc == 'true'
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu
      - name: Build
        env:
          CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER: ${{ matrix.linker }}
        run: cargo build --release --locked --target ${{ matrix.rust_target }} -p agent_ads_cli
      - name: Stage binary
        shell: bash
        run: |
          mkdir -p dist
          cp target/${{ matrix.rust_target }}/release/${{ matrix.binary_name }} dist/${{ matrix.dist_name }}
      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.dist_name }}
          path: dist/${{ matrix.dist_name }}

  npm:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          registry-url: "https://registry.npmjs.org"
      - name: Install npm dependencies
        run: npm ci
      - name: Build npm TypeScript
        run: npm run build:ts
      - uses: actions/download-artifact@v4
        with:
          path: dist
      - name: Flatten artifacts
        run: |
          mkdir -p dist-flat
          find dist -type f -maxdepth 2 -exec cp {} dist-flat/ \;
      - name: Prepare packages
        run: |
          AGENT_ADS_VERSION="${GITHUB_REF_NAME#v}" \
          AGENT_ADS_BINARY_DIR="${GITHUB_WORKSPACE}/dist-flat" \
          node npm/agent-ads/scripts/prepare-release.js
      - name: Publish npm packages
        env:
          NPM_PUBLISH_TOKEN: ${{ secrets.NPM_PUBLISH_TOKEN }}
        run: |
          if [ -n "$NPM_PUBLISH_TOKEN" ]; then
            echo "Using NPM_PUBLISH_TOKEN for bootstrap or fallback npm auth."
            export NODE_AUTH_TOKEN="$NPM_PUBLISH_TOKEN"
          else
            echo "NPM_PUBLISH_TOKEN is not set; attempting npm trusted publishing only."
          fi
          node npm/agent-ads/scripts/publish-release.js
